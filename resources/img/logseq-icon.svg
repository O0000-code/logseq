<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient: top to bottom, gray-blue -->
    <linearGradient id="bgGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6e849a"/>
      <stop offset="100%" stop-color="#435a70"/>
    </linearGradient>

    <!-- Subtle top-light overlay for Apple-style depth -->
    <linearGradient id="topSheen" x1="0.5" y1="0" x2="0.5" y2="0.5">
      <stop offset="0%" stop-color="white" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Bottom shadow overlay -->
    <linearGradient id="bottomShadow" x1="0.5" y1="0.65" x2="0.5" y2="1">
      <stop offset="0%" stop-color="black" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.06"/>
    </linearGradient>

    <!-- Subtle shadow for the bracket symbol -->
    <filter id="symbolShadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="black" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Squircle background with gradient -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bgGradient)"/>

  <!-- Top sheen for glass/depth effect -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#topSheen)"/>

  <!-- Bottom subtle darkening -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bottomShadow)"/>

  <!-- Logseq double bracket symbol -->
  <g transform="translate(512, 512)" fill="none" stroke="white" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" filter="url(#symbolShadow)">

    <!-- Outer left [ -->
    <path d="
      M -230,-250
      L -276,-250
      Q -310,-250 -310,-216
      L -310,216
      Q -310,250 -276,250
      L -230,250
    " opacity="0.96"/>

    <!-- Inner left [ -->
    <path d="
      M -90,-250
      L -136,-250
      Q -170,-250 -170,-216
      L -170,216
      Q -170,250 -136,250
      L -90,250
    " opacity="0.96"/>

    <!-- Inner right ] -->
    <path d="
      M 90,-250
      L 136,-250
      Q 170,-250 170,-216
      L 170,216
      Q 170,250 136,250
      L 90,250
    " opacity="0.96"/>

    <!-- Outer right ] -->
    <path d="
      M 230,-250
      L 276,-250
      Q 310,-250 310,-216
      L 310,216
      Q 310,250 276,250
      L 230,250
    " opacity="0.96"/>

  </g>

</svg>