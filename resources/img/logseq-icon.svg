<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Clean white background gradient with warmth -->
    <linearGradient id="bgGradient" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f3f3f5"/>
    </linearGradient>

    <!-- Top sheen for Apple-style glass feel -->
    <linearGradient id="topSheen" x1="0.5" y1="0" x2="0.5" y2="0.45">
      <stop offset="0%" stop-color="white" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Bottom subtle shadow for grounding -->
    <linearGradient id="bottomShade" x1="0.5" y1="0.75" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#e0e0e4" stop-opacity="0"/>
      <stop offset="100%" stop-color="#d8d8dc" stop-opacity="0.4"/>
    </linearGradient>

    <!-- Subtle border for edge definition on white -->
    <linearGradient id="borderGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#d4d4d8" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#c8c8cc" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#b8b8bc" stop-opacity="0.5"/>
    </linearGradient>

    <!-- Soft shadow for bracket symbol -->
    <filter id="symbolShadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#1a1a2e" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Base squircle background -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bgGradient)"/>

  <!-- Top sheen overlay -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#topSheen)"/>

  <!-- Bottom grounding shade -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bottomShade)"/>

  <!-- Edge border -->
  <rect x="0.75" y="0.75" width="1022.5" height="1022.5" rx="223.5" ry="223.5" fill="none" stroke="url(#borderGrad)" stroke-width="1.5"/>

  <!-- Logseq double bracket symbol -->
  <g transform="translate(512, 512) scale(0.83)" fill="none" stroke="#1d1d1f" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" filter="url(#symbolShadow)">

    <!-- Outer left [ -->
    <path d="
      M -230,-250
      L -276,-250
      Q -310,-250 -310,-216
      L -310,216
      Q -310,250 -276,250
      L -230,250
    "/>

    <!-- Inner left [ -->
    <path d="
      M -90,-250
      L -136,-250
      Q -170,-250 -170,-216
      L -170,216
      Q -170,250 -136,250
      L -90,250
    "/>

    <!-- Inner right ] -->
    <path d="
      M 90,-250
      L 136,-250
      Q 170,-250 170,-216
      L 170,216
      Q 170,250 136,250
      L 90,250
    "/>

    <!-- Outer right ] -->
    <path d="
      M 230,-250
      L 276,-250
      Q 310,-250 310,-216
      L 310,216
      Q 310,250 276,250
      L 230,250
    "/>

  </g>

</svg>
